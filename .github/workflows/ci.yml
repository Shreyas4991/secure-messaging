name: CI

on:
  push:
    branches: ["main"]
    paths:
      - '**/*.lean'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ["main"]
    paths:
      - '**/*.lean'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: leanprover/lean-action@v1
        with:
          auto-config: "false"
          build: "true"
          use-mathlib-cache: "true"

      - name: Build documentation
        run: lake build SecureMessagingDocs

      - name: Generate documentation site
        run: lake env lean --run SecureMessagingDocsMain.lean --output _out/site

      - name: Validate site output
        run: test -f _out/site/html-multi/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _out/site/html-multi

  deploy:
    name: Deploy Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
