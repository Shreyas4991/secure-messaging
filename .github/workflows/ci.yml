name: CI

on:
  push:
    branches: ["main"]
    paths:
      - '**/*.lean'
      - 'scripts/**'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ["main"]
    paths:
      - '**/*.lean'
      - 'scripts/**'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache Lake build products
        id: lake-build-cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json', '**/*.lean') }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}-
            lake-build-${{ runner.os }}-

      - uses: leanprover/lean-action@v1
        with:
          auto-config: "false"
          build: "true"
          use-mathlib-cache: "true"

      - name: Build documentation modules
        run: |
          lake build \
            SecureMessagingDocs.Chapters.AEAD.Defs \
            SecureMessagingDocs.Chapters.AEAD.AESGCM \
            SecureMessagingDocs.Chapters.AEAD.EncryptThenMAC \
            SecureMessagingDocs.Chapters.CKA.Defs \
            SecureMessagingDocs.Chapters.CKA.FromDDH \
            SecureMessagingDocs.Chapters.CKA.FromKEM \
            SecureMessagingDocs.Chapters.CKA.FromLWE \
            SecureMessagingDocs.Chapters.ErasureCodes.Defs \
            SecureMessagingDocs.Chapters.ErasureCodes.ReedSolomon \
            SecureMessagingDocs.Chapters.FSAEAD.Defs \
            SecureMessagingDocs.Chapters.FSAEAD.FromAEADPRG \
            SecureMessagingDocs.Chapters.OnOffKEM.Defs \
            SecureMessagingDocs.Chapters.OnOffKEM.FromMLKEM \
            SecureMessagingDocs.Chapters.PRFPRNG.Defs \
            SecureMessagingDocs.Chapters.PRFPRNG.FromPRPPRG \
            SecureMessagingDocs.Chapters.RKEM.Defs \
            SecureMessagingDocs.Chapters.RKEM.FromDDHNonFS \
            SecureMessagingDocs.Chapters.RKEM.FromDDHFS \
            SecureMessagingDocs.Chapters.RKEM.FromKEM \
            SecureMessagingDocs.Chapters.RKEM.KatanaPlain \
            SecureMessagingDocs.Chapters.RKEM.KatanaOptimised \
            SecureMessagingDocs.Chapters.SCKA.Defs \
            SecureMessagingDocs.Chapters.SCKA.UniKEM \
            SecureMessagingDocs.Chapters.SCKA.BiKEM \
            SecureMessagingDocs.Chapters.SCKA.RKEM \
            SecureMessagingDocs.Chapters.SCKA.OppUniKEM \
            SecureMessagingDocs.Chapters.SCKA.OppBiKEM \
            SecureMessagingDocs.Chapters.SCKA.OppRKEM \
            SecureMessagingDocs.Chapters.SecureMessaging.Defs \
            SecureMessagingDocs.Chapters.SecureMessaging.DoubleRatchetAbstract \
            SecureMessagingDocs.Chapters.SecureMessaging.DoubleRatchetSignal \
            SecureMessagingDocs.Chapters.SecureMessaging.TripleRatchet \
            SecureMessagingDocs.Chapters.SecureMessaging.SCKA \
            SecureMessagingDocs.Visuals.Style

      - name: Generate documentation site
        env:
          BLUEPRINT_PROGRESS_HISTORY_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/blueprint-progress-history.json
          GH_TOKEN: ${{ github.token }}
        run: scripts/render-docs-site.sh

      - name: Validate site output
        run: |
          test -f _out/site/html-multi/index.html
          test -f _out/site/html-multi/blueprint-progress-history.json
          chapters=(
            Authenticated-Encryption-with-Associated-Data
            Continuous-Key-Agreement
            Erasure-Codes
            Forward-Secure-AEAD
            Online-Offline-KEM
            PRF-PRNG
            Ratcheting-KEM
            Sparse-Continuous-Key-Agreement
            Secure-Messaging
          )
          for chapter in "${chapters[@]}"; do
            test -f "_out/site/html-multi/$chapter/index.html"
            test -f "_out/site/html-multi/$chapter/Dependency-Graph/index.html"
            test -f "_out/site/html-multi/$chapter/Blueprint-Summary/index.html"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _out/site/html-multi

  deploy:
    name: Deploy Pages
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
