name: CI

on:
  push:
    branches: ["main"]
    paths:
      - '**/*.lean'
      - 'scripts/**'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ["main"]
    paths:
      - '**/*.lean'
      - 'scripts/**'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Reclaim ~30 GB of preinstalled SDKs we don't use, so the disk-heavy
      # Lean+mathlib build doesn't run out of space. Keeps /opt/hostedtoolcache
      # (node/python). Hosted, ephemeral runner only — never do this self-hosted.
      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      # Detect whether anything that affects the documentation site changed.
      # Deliberately excludes `.github/workflows/ci.yml`, so editing CI alone
      # runs the sorry audit but skips the (expensive) doc build + deploy.
      - name: Detect documentation-relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - '**/*.lean'
              - 'lean-toolchain'
              - 'lakefile.toml'
              - 'lake-manifest.json'
              - 'scripts/**'

      - name: Cache Lake build products
        id: lake-build-cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json', '**/*.lean') }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}-
            lake-build-${{ runner.os }}-

      # Dependency builds (the verso stack, VCVio, PolyFun, …) are not covered
      # by the mathlib cache, so cache them separately keyed on the manifest:
      # they only rebuild when lake-manifest.json or the toolchain changes,
      # not on every code PR. mathlib itself comes from use-mathlib-cache.
      - name: Cache Lake dependency builds
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/*/.lake/build
            !.lake/packages/mathlib/.lake/build
          key: lake-deps-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

      - uses: leanprover/lean-action@v1
        with:
          auto-config: "false"
          build: "true"
          lint: "true"
          use-mathlib-cache: "true"

      # --- Sorry audit (veritooling) ---
      # Reuses the build above. All orchestration (restore baseline, audit,
      # cache, upload artifacts) lives in the sorry-audit composite action.
      - name: Sorry audit
        uses: Beneficial-AI-Foundation/veritooling/actions/sorry-audit@v1
        with:
          # Zero-config; reuses the build above and reports each sorry's file:line.
          backend: probe
          # Annotate newly-introduced sorries inline on the PR diff.
          annotate-new-sorries: "true"

      - name: Build documentation modules
        if: steps.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          lake build \
            SecureMessagingDocs.Chapters.AEAD.Defs \
            SecureMessagingDocs.Chapters.AEAD.AESGCM \
            SecureMessagingDocs.Chapters.AEAD.EncryptThenMAC \
            SecureMessagingDocs.Chapters.CKA.Defs \
            SecureMessagingDocs.Chapters.CKA.FromDDH \
            SecureMessagingDocs.Chapters.CKA.FromKEM \
            SecureMessagingDocs.Chapters.CKA.FromLWE \
            SecureMessagingDocs.Chapters.ErasureCodes.Defs \
            SecureMessagingDocs.Chapters.ErasureCodes.ReedSolomon \
            SecureMessagingDocs.Chapters.FSAEAD.Defs \
            SecureMessagingDocs.Chapters.FSAEAD.FromAEADPRG \
            SecureMessagingDocs.Chapters.OnOffKEM.Defs \
            SecureMessagingDocs.Chapters.OnOffKEM.FromMLKEM \
            SecureMessagingDocs.Chapters.PRFPRNG.Defs \
            SecureMessagingDocs.Chapters.PRFPRNG.FromPRPPRG \
            SecureMessagingDocs.Chapters.RKEM.Defs \
            SecureMessagingDocs.Chapters.RKEM.FromDDHNonFS \
            SecureMessagingDocs.Chapters.RKEM.FromDDHFS \
            SecureMessagingDocs.Chapters.RKEM.FromKEM \
            SecureMessagingDocs.Chapters.RKEM.KatanaPlain \
            SecureMessagingDocs.Chapters.RKEM.KatanaOptimised \
            SecureMessagingDocs.Chapters.SCKA.Defs \
            SecureMessagingDocs.Chapters.SCKA.UniKEM \
            SecureMessagingDocs.Chapters.SCKA.BiKEM \
            SecureMessagingDocs.Chapters.SCKA.RKEM \
            SecureMessagingDocs.Chapters.SCKA.OppUniKEM \
            SecureMessagingDocs.Chapters.SCKA.OppBiKEM \
            SecureMessagingDocs.Chapters.SCKA.OppRKEM \
            SecureMessagingDocs.Chapters.SecureMessaging.Defs \
            SecureMessagingDocs.Chapters.SecureMessaging.DoubleRatchetAbstract \
            SecureMessagingDocs.Chapters.SecureMessaging.DoubleRatchetSignal \
            SecureMessagingDocs.Chapters.SecureMessaging.TripleRatchet \
            SecureMessagingDocs.Chapters.SecureMessaging.SCKA \
            SecureMessagingDocs.Visuals.Style

      - name: Generate documentation site
        if: steps.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        env:
          BLUEPRINT_PROGRESS_HISTORY_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/blueprint-progress-history.json
          GH_TOKEN: ${{ github.token }}
        run: scripts/render-docs-site.sh

      - name: Validate site output
        if: steps.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          test -f _out/site/html-multi/index.html
          test -f _out/site/html-multi/blueprint-progress-history.json
          chapters=(
            Authenticated-Encryption-with-Associated-Data
            Continuous-Key-Agreement
            Erasure-Codes
            Forward-Secure-AEAD
            Online-Offline-KEM
            PRF-PRNG
            Ratcheting-KEM
            Sparse-Continuous-Key-Agreement
            Secure-Messaging
          )
          for chapter in "${chapters[@]}"; do
            test -f "_out/site/html-multi/$chapter/index.html"
            test -f "_out/site/html-multi/$chapter/Dependency-Graph/index.html"
            test -f "_out/site/html-multi/$chapter/Blueprint-Summary/index.html"
          done

      - name: Upload Pages artifact
        if: steps.changes.outputs.docs == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _out/site/html-multi

  deploy:
    name: Deploy Pages
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build.outputs.docs == 'true')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
